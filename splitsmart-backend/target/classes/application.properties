# Server
server.port=8080

# Database - MySQL running with empty root password (initialized fresh)
spring.datasource.url=jdbc:mysql://localhost:3306/splitsmart?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=splitsmart-super-secret-key-change-this-in-production-min-256-bits
jwt.expiration=86400000

# Logging
logging.level.com.splitsmart=INFO
logging.level.org.springframework.security=WARN
